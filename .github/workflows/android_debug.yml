name: Android Debug APK

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Build llama.cpp shared libs (arm64-v8a)
        run: |
          set -e
          rm -rf /tmp/llama.cpp
          git clone --depth 1 https://github.com/ggml-org/llama.cpp.git /tmp/llama.cpp
          cd /tmp/llama.cpp
          cmake -S . -B build-android \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DBUILD_SHARED_LIBS=ON \
            -DLLAMA_CURL=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_SERVER=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TOOLS=OFF
          cmake --build build-android -j 4
          mkdir -p "$GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a"
          find build-android -type f -name "*.so*" -maxdepth 4 -print -exec cp -f {} "$GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/" \;
          ls -la "$GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a" || true

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        env:
          TERMUX_CI_AARCH64_ONLY: "1"
        run: ./gradlew :app:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
