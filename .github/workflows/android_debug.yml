name: Android Debug APK

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Build llama.cpp for Android (arm64)
        run: |
          set -e
          rm -rf /tmp/llama.cpp
          git clone --depth 1 https://github.com/ggml-org/llama.cpp.git /tmp/llama.cpp
          cd /tmp/llama.cpp

          cmake \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_OPENMP=OFF \
            -DLLAMA_CURL=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_SERVER=OFF \
            -DLLAMA_BUILD_EXAMPLES=ON \
            -DLLAMA_BUILD_TOOLS=OFF \
            -B build-android

          cmake --build build-android --config Release -j 4

          mkdir -p "$GITHUB_WORKSPACE/app/src/main/assets/llama/arm64-v8a"
          cp build-android/bin/llama-cli "$GITHUB_WORKSPACE/app/src/main/assets/llama/arm64-v8a/"
          cp build-android/bin/*.so "$GITHUB_WORKSPACE/app/src/main/assets/llama/arm64-v8a/" || true

      - name: Copy libc++_shared.so
        run: |
          mkdir -p "$GITHUB_WORKSPACE/app/src/main/assets/llama/arm64-v8a"
          find "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android" \
            -name "libc++_shared.so" \
            -exec cp {} "$GITHUB_WORKSPACE/app/src/main/assets/llama/arm64-v8a/" \;

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        env:
          TERMUX_CI_AARCH64_ONLY: "1"
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
